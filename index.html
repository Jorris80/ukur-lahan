<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14181F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GeoUkur GPS</title>
  <meta name="description" content="Pengukuran lahan berbasis GPS dengan Google Sheets sebagai basis data.">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="manifest" href="manifest.webmanifest">
<style>
/* ============================================================
   GeoUkur GPS — gaya lapangan: kontras tinggi, target sentuh besar,
   angka pakai monospace supaya terbaca seperti alat ukur.
   ============================================================ */
:root{
  --tinta:#14181F;
  --tinta-2:#3C4655;
  --tinta-3:#7A869A;
  --kertas:#F2F1EC;
  --putih:#FFFFFF;
  --garis:#DBD8D0;
  --oranye:#E8590C;   /* warna patok & pita ukur */
  --oranye-mud:#FFF1E7;
  --hijau:#137A3B;
  --kuning:#B8860B;
  --merah:#B42318;
  --biru:#1B6AA8;
  --radius:14px;
  --bayang:0 2px 10px rgba(20,24,31,.10);
  --mono:ui-monospace,"SF Mono","Roboto Mono","DejaVu Sans Mono",Menlo,monospace;
  --aman-bawah:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overscroll-behavior:none}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--kertas);color:var(--tinta);font-size:15px;line-height:1.45;
}
button,input,select,textarea{font-family:inherit;font-size:16px} /* 16px = iOS tidak auto-zoom */
.tersembunyi{display:none!important}

/* ---------- LOGIN ---------- */
.login{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#14181F 0%,#232C38 60%,#3A2A1C 100%)}
.login-kotak{width:100%;max-width:380px;background:var(--putih);border-radius:18px;padding:26px 22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.merek{display:flex;gap:12px;align-items:center;margin-bottom:22px}
.merek-ikon{width:48px;height:48px;display:grid;place-items:center;font-size:24px;background:var(--oranye-mud);border-radius:12px}
.merek h1{margin:0;font-size:19px;letter-spacing:-.3px}
.merek p{margin:1px 0 0;font-size:12.5px;color:var(--tinta-3)}
.lbl{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tinta-2);margin:14px 0 6px}
.inp{width:100%;padding:13px 14px;border:1.5px solid var(--garis);border-radius:10px;background:#FBFBF9;outline:none}
.inp:focus{border-color:var(--oranye);box-shadow:0 0 0 3px rgba(232,89,12,.14)}
.pesan-galat{color:var(--merah);font-size:13px;min-height:18px;margin:10px 0 0}
.jejak{text-align:center;font-size:11px;color:var(--tinta-3);margin:14px 0 0}

/* ---------- TOMBOL ---------- */
.btn{border:1.5px solid var(--garis);background:var(--putih);color:var(--tinta);
  padding:12px 16px;border-radius:10px;font-weight:600;cursor:pointer;min-height:46px}
.btn:active{transform:translateY(1px)}
.btn-utama{background:var(--oranye);border-color:var(--oranye);color:#fff}
.btn-bahaya{background:#fff;border-color:var(--merah);color:var(--merah)}
.btn-sukses{background:var(--hijau);border-color:var(--hijau);color:#fff}
.btn-lebar{width:100%;margin-top:20px}
.btn-kecil{padding:7px 12px;min-height:36px;font-size:13px;border-radius:8px}
.ikon-btn{border:none;background:transparent;font-size:20px;padding:8px;cursor:pointer;color:var(--tinta);
  min-width:44px;min-height:44px;border-radius:10px}
.ikon-btn.bulat{background:var(--putih);border:1px solid var(--garis);box-shadow:var(--bayang);border-radius:50%;width:48px;height:48px;padding:0}
.ikon-btn.kotak{background:var(--putih);border:1.5px solid var(--garis);box-shadow:var(--bayang);width:54px;height:54px}
.ikon-btn.nyala{background:var(--oranye);border-color:var(--oranye);color:#fff}

/* ---------- KERANGKA APLIKASI ---------- */
.app{display:flex;flex-direction:column;height:100%}
.kepala{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--tinta);color:#fff;
  padding-top:calc(10px + env(safe-area-inset-top,0px))}
.kepala .ikon-btn{color:#fff;font-size:26px}
.kepala-judul{flex:1;min-width:0}
.kepala-judul strong{display:block;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kepala-judul small{display:block;font-size:11.5px;color:#9AA5B4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kepala-kanan{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ikon-btn.keluar{font-size:19px;color:#9AA5B4;min-width:40px;min-height:40px;padding:0}
.ikon-btn.keluar:active{color:#FF7A5C}
.lencana-jaringan{display:flex;align-items:center;gap:5px;font-size:11px;color:#9AA5B4;padding:5px 9px;
  background:rgba(255,255,255,.08);border-radius:20px}
.lencana-jaringan .titik{width:7px;height:7px;border-radius:50%;background:#34C759}
.lencana-jaringan.mati .titik{background:#FF9F0A}

.bilah-antrean{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 12px;background:#FFF4E0;border-bottom:1px solid #F0DCB0;font-size:13px;color:#7A5B00}

.isi{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.halaman{padding:14px 14px calc(90px + var(--aman-bawah))}
#halPeta{padding:0;position:absolute;inset:0}

/* ---------- NAVIGASI BAWAH ---------- */
.nav{display:flex;background:var(--putih);border-top:1px solid var(--garis);
  padding-bottom:var(--aman-bawah);z-index:900}
.nav-btn{flex:1;border:none;background:transparent;padding:8px 4px 10px;font-size:10.5px;font-weight:600;
  color:var(--tinta-3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:56px}
.nav-btn span{font-size:20px;line-height:1}
.nav-btn.aktif{color:var(--oranye)}

/* ---------- STATISTIK ---------- */
.statistik{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--putih);border:1px solid var(--garis);border-radius:var(--radius);padding:12px 14px}
.stat b{display:block;font-family:var(--mono);font-size:22px;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.stat span{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--tinta-3);font-weight:600}
.stat.sorot{background:var(--tinta);color:#fff;border-color:var(--tinta)}
.stat.sorot span{color:#9AA5B4}

/* ---------- PENCARIAN ---------- */
.alat-cari{display:flex;gap:8px;margin-bottom:12px}
.inp-cari{flex:1}
.inp-filter{width:130px}

/* ---------- DAFTAR LAHAN ---------- */
.daftar{display:flex;flex-direction:column;gap:10px}
.kartu{background:var(--putih);border:1px solid var(--garis);border-radius:var(--radius);padding:13px 14px;
  cursor:pointer;position:relative;overflow:hidden}
.kartu:active{background:#FBFAF7}
.kartu::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tinta-3)}
.kartu.st-Aktif::before{background:var(--oranye)}
.kartu.st-Selesai::before{background:var(--hijau)}
.kartu.st-Dijeda::before{background:var(--kuning)}
.kartu-atas{display:flex;justify-content:space-between;align-items:start;gap:8px}
.kartu h3{margin:0;font-size:15.5px;line-height:1.3}
.kartu .sub{font-size:12.5px;color:var(--tinta-3);margin-top:2px}
.pil{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:3px 8px;border-radius:20px;
  background:#EEE;color:var(--tinta-2);white-space:nowrap}
.pil.Aktif{background:var(--oranye-mud);color:var(--oranye)}
.pil.Selesai{background:#E4F3E9;color:var(--hijau)}
.pil.Dijeda{background:#FBF3DD;color:var(--kuning)}
.kartu-angka{display:flex;gap:16px;margin-top:10px;padding-top:9px;border-top:1px dashed var(--garis)}
.kartu-angka div{font-size:11px;color:var(--tinta-3)}
.kartu-angka b{display:block;font-family:var(--mono);font-size:14px;color:var(--tinta);font-variant-numeric:tabular-nums}
.kosong{text-align:center;padding:44px 20px;color:var(--tinta-3)}
.kosong b{display:block;font-size:16px;color:var(--tinta-2);margin-bottom:4px}

.fab-lebar{position:fixed;left:14px;right:14px;bottom:calc(70px + var(--aman-bawah));
  background:var(--oranye);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;
  box-shadow:0 6px 20px rgba(232,89,12,.35);cursor:pointer;z-index:800}

/* ---------- PETA ---------- */
#peta{position:absolute;inset:0;background:#DDD9D0}
.leaflet-container{font-family:inherit}
/* Zoom digeser ke atas supaya tidak tertutup bilah "Rekam Titik", dan diperbesar untuk jari */
.leaflet-bottom.leaflet-left{bottom:calc(130px + var(--aman-bawah))}
.leaflet-control-zoom{border:1px solid var(--garis)!important;box-shadow:var(--bayang)!important;border-radius:12px!important;overflow:hidden}
.leaflet-control-zoom a{width:44px!important;height:44px!important;line-height:42px!important;font-size:21px!important;color:var(--tinta)!important}
.leaflet-control-attribution{font-size:9px;max-width:58vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Baris pilihan peta dasar */
.pilih-peta{display:flex;align-items:center;gap:12px;padding:13px 8px;border-bottom:1px solid var(--garis);
  width:100%;border-left:none;border-right:none;border-top:none;background:transparent;text-align:left;cursor:pointer;min-height:56px}
.pilih-peta:last-of-type{border-bottom:none}
.pilih-peta .em{font-size:20px;width:28px;text-align:center}
.pilih-peta b{display:block;font-size:14.5px}
.pilih-peta small{color:var(--tinta-3);font-size:11.5px}
.pilih-peta.aktif{background:var(--oranye-mud);border-radius:10px}
.pilih-peta.aktif b{color:var(--oranye)}
.bar-muat{height:6px;background:var(--garis);border-radius:3px;overflow:hidden;margin-top:8px}
.bar-muat i{display:block;height:100%;background:var(--oranye);width:0;transition:width .2s}

/* Papan ukur — elemen tanda tangan */
.papan-ukur{position:absolute;top:10px;left:10px;right:10px;z-index:600;background:rgba(255,255,255,.96);
  border:1px solid var(--garis);border-radius:12px;box-shadow:var(--bayang);overflow:hidden;backdrop-filter:blur(6px)}
.pita{height:6px;background:repeating-linear-gradient(90deg,var(--oranye) 0 2px,transparent 2px 10px);opacity:.85}
.papan-baris{display:flex}
.papan-sel{flex:1;padding:7px 6px 8px;text-align:center;border-left:1px solid var(--garis)}
.papan-sel:first-child{border-left:none}
.papan-sel.utama{flex:1.5;background:var(--oranye-mud)}
.papan-lbl{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tinta-3);font-weight:700}
.papan-sel b{font-family:var(--mono);font-size:17px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.papan-sel.utama b{font-size:20px;color:var(--oranye)}
.papan-sel i{font-style:normal;font-size:10px;color:var(--tinta-3);margin-left:2px}

.peringatan-geo{position:absolute;top:74px;left:10px;right:10px;z-index:600;background:#FFF0EE;
  border:1px solid #F3C4BF;color:var(--merah);font-size:12px;padding:8px 10px;border-radius:10px}

.kendali-peta{position:absolute;right:10px;top:96px;z-index:600;display:flex;flex-direction:column;gap:8px;
  max-height:calc(100% - 260px);pointer-events:none}
.kendali-peta > *{pointer-events:auto}

/* Peringatan tumpang tindih — merah, di bawah peringatan geometri */
.peringatan-tumpang{position:absolute;left:10px;right:10px;top:74px;z-index:601;background:var(--merah);color:#fff;
  font-size:12.5px;padding:9px 11px;border-radius:10px;box-shadow:var(--bayang);cursor:pointer;font-weight:600}
.peringatan-geo:not(.tersembunyi) ~ .peringatan-tumpang{top:118px}

/* Penanda rekan surveyor.
   Wadah ikon Leaflet diberi ukuran nyata (34x34) dan jangkar di tengahnya, supaya
   bulatan tepat berada di pusat lingkaran akurasi. Versi lama memakai iconSize [0,0]
   sehingga bulatannya kena flex-shrink dan tampil lonjong serta melenceng. */
.rekan{position:relative;width:34px;height:34px}
.rekan .bulat-rekan{position:absolute;inset:0;width:34px;height:34px;border-radius:50%;
  border:3px solid #fff;box-sizing:border-box;overflow:hidden;display:grid;place-items:center;
  color:#fff;font-size:12px;font-weight:800;box-shadow:0 2px 7px rgba(0,0,0,.4);font-family:var(--mono)}
.rekan .bulat-rekan img{width:100%;height:100%;object-fit:cover;display:block}
.rekan .nama-rekan{position:absolute;left:40px;top:50%;transform:translateY(-50%);
  background:rgba(20,24,31,.84);color:#fff;font-size:10.5px;padding:3px 7px;border-radius:7px;white-space:nowrap}
.rekan.basi{opacity:.45}

/* Kartu rekan di lembar info */
.profil{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.profil .avatar{width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0;display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:22px;font-family:var(--mono);border:2px solid var(--garis)}
.profil .avatar img{width:100%;height:100%;object-fit:cover}
.profil b{display:block;font-size:17px}
.profil span{font-size:12.5px;color:var(--tinta-3)}

/* Label bidang tetangga */
.label-bidang{background:rgba(255,255,255,.9);border:1px solid var(--garis);border-radius:6px;padding:2px 6px;
  font-size:10.5px;font-weight:700;color:var(--tinta-2);white-space:nowrap;transform:translate(-50%,-50%)}
.label-bidang.bentrok{background:var(--merah);color:#fff;border-color:var(--merah)}

.baris-konflik{display:flex;gap:10px;align-items:center;padding:11px 4px;border-bottom:1px solid var(--garis)}
.baris-konflik .kotak-luas{background:#FFF0EE;border:1px solid #F3C4BF;color:var(--merah);border-radius:9px;
  padding:6px 8px;text-align:center;flex-shrink:0;min-width:78px}
.baris-konflik .kotak-luas b{display:block;font-family:var(--mono);font-size:13px}
.baris-konflik .kotak-luas span{font-size:9px;text-transform:uppercase;letter-spacing:.5px}

.aksi-bawah{position:absolute;left:10px;right:10px;bottom:calc(12px + var(--aman-bawah));z-index:600;
  display:flex;align-items:center;gap:10px}

/* Status cepat di atas tombol rekam — surveyor tidak perlu buka menu */
.bilah-status{position:absolute;left:10px;right:10px;bottom:calc(84px + var(--aman-bawah));z-index:600;
  display:flex;gap:6px}
.chip-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip{flex:1;min-height:40px;border:1.5px solid var(--garis);background:rgba(255,255,255,.95);color:var(--tinta-2);
  border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:var(--bayang);padding:0 4px}
.chip:active{transform:translateY(1px)}
.chip.aktif{background:var(--tinta);border-color:var(--tinta);color:#fff}
.chip.aktif[data-st="Aktif"]{background:var(--oranye);border-color:var(--oranye)}
.chip.aktif[data-st="Selesai"]{background:var(--hijau);border-color:var(--hijau)}
.chip.aktif[data-st="Dijeda"]{background:var(--kuning);border-color:var(--kuning)}
.chip[disabled]{opacity:.45}

/* Pratinjau logo di pengaturan */
.pratinjau-logo{display:flex;align-items:center;gap:12px;padding:10px;border:1px dashed var(--garis);
  border-radius:10px;background:#FBFBF9;margin-bottom:8px}
.pratinjau-logo img{height:52px;max-width:150px;object-fit:contain}
.pratinjau-logo span{font-size:12px;color:var(--tinta-3)}
.btn-rekam{flex:1;height:64px;border:none;border-radius:16px;background:var(--oranye);color:#fff;cursor:pointer;
  box-shadow:0 6px 22px rgba(232,89,12,.42);display:flex;flex-direction:column;justify-content:center;gap:2px}
.btn-rekam:active{transform:scale(.98)}
.btn-rekam[disabled]{background:var(--tinta-3);box-shadow:none}
.btn-rekam.merekam{background:var(--merah);box-shadow:0 6px 22px rgba(180,35,24,.42)}
.rekam-judul{font-size:16px;font-weight:800;letter-spacing:.3px}
.rekam-sub{font-size:11px;opacity:.9;font-family:var(--mono)}

/* Penanda titik */
.penanda{width:26px;height:26px;border-radius:50%;background:var(--oranye);border:2.5px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.35);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;
  font-family:var(--mono)}
.penanda.buram{background:var(--kuning)}       /* akurasi di luar toleransi */
.penanda.tunda{background:var(--tinta-3);border-style:dashed} /* belum tersinkron */
.penanda.pilih{transform:scale(1.25);box-shadow:0 0 0 4px rgba(232,89,12,.3)}
/* Titik hasil rekam otomatis: bulatan kecil tanpa nomor, agar jalur rapat tetap terbaca */
.penanda.kecil{width:12px;height:12px;border-width:2px;font-size:0}

/* Papan tanda tangan */
.pad-ttd{width:100%;height:180px;border:1.5px dashed var(--garis);border-radius:12px;background:#FBFBF9;
  touch-action:none;display:block}
.pad-info{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--tinta-3);margin-top:6px}
.ttd-baris{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--garis)}
.ttd-baris:last-of-type{border-bottom:none}
.ttd-baris img{height:44px;max-width:110px;object-fit:contain;background:#FBFBF9;border:1px solid var(--garis);border-radius:8px;padding:2px}
.ttd-baris .kosong-ttd{height:44px;width:110px;border:1px dashed var(--garis);border-radius:8px;display:grid;
  place-items:center;font-size:10.5px;color:var(--tinta-3);flex-shrink:0}
.ttd-baris .isi{flex:1;min-width:0}
.ttd-baris .isi b{display:block;font-size:14px}
.ttd-baris .isi span{font-size:11.5px;color:var(--tinta-3)}

/* ---------- LEMBAR BAWAH ---------- */
.tirai{position:fixed;inset:0;background:rgba(20,24,31,.5);z-index:1000}
.lembar{position:fixed;left:0;right:0;bottom:0;z-index:1001;background:var(--putih);
  border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;
  padding-bottom:var(--aman-bawah);animation:naik .22s ease}
@keyframes naik{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.lembar{animation:none}}
.lembar-pegangan{width:38px;height:4px;background:var(--garis);border-radius:4px;margin:9px auto 2px}
.lembar-kepala{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 8px;border-bottom:1px solid var(--garis)}
.lembar-kepala strong{font-size:16px}
.lembar-isi{overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}

/* Baris daftar titik */
.baris-titik{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--garis)}
.baris-titik:last-child{border-bottom:none}
.kode{width:38px;height:38px;border-radius:9px;background:var(--tinta);color:#fff;display:grid;place-items:center;
  font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0}
.kode.buram{background:var(--kuning)}
.baris-titik .koor{flex:1;min-width:0}
.baris-titik .koor b{display:block;font-family:var(--mono);font-size:12.5px;font-variant-numeric:tabular-nums}
.baris-titik .koor span{font-size:11px;color:var(--tinta-3)}

/* Form */
.grup{margin-bottom:12px}
.grup .lbl{margin-top:0}
.dua-kolom{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea.inp{min-height:72px;resize:vertical}
.aksi-baris{display:flex;gap:8px;margin-top:14px}
.aksi-baris .btn{flex:1}
.menu-daftar{display:flex;flex-direction:column;gap:2px}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 8px;border:none;background:transparent;
  text-align:left;font-size:15px;cursor:pointer;border-bottom:1px solid var(--garis);width:100%;min-height:52px}
.menu-item:last-child{border-bottom:none}
.menu-item .em{font-size:19px;width:26px;text-align:center}
.menu-item small{display:block;font-size:11.5px;color:var(--tinta-3)}

/* Log */
.log{display:flex;gap:10px;padding:11px 0;border-bottom:1px dashed var(--garis)}
.log-tanda{width:8px;height:8px;border-radius:50%;background:var(--oranye);margin-top:6px;flex-shrink:0}
.log b{font-size:13.5px}
.log p{margin:1px 0 0;font-size:12.5px;color:var(--tinta-2)}
.log time{font-size:11px;color:var(--tinta-3);font-family:var(--mono)}

/* Tabel ringkas (sisi/patok) */
.tabel{width:100%;border-collapse:collapse;font-size:12.5px}
.tabel th,.tabel td{padding:7px 6px;border-bottom:1px solid var(--garis);text-align:left}
.tabel th{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--tinta-3)}
.tabel td.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums}

/* Galeri foto */
.galeri{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.galeri figure{margin:0;position:relative}
.galeri img{width:100%;height:92px;object-fit:cover;border-radius:9px;border:1px solid var(--garis)}
.galeri button{position:absolute;top:4px;right:4px;background:rgba(20,24,31,.75);color:#fff;border:none;
  border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer}

/* ---------- TOAST & TUNGGU ---------- */
.toast{position:fixed;left:14px;right:14px;bottom:calc(80px + var(--aman-bawah));z-index:2000;
  background:var(--tinta);color:#fff;padding:12px 15px;border-radius:11px;font-size:13.5px;box-shadow:var(--bayang)}
.toast.galat{background:var(--merah)}
.toast.sukses{background:var(--hijau)}
.tunggu{position:fixed;inset:0;z-index:3000;background:rgba(242,241,236,.8);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;font-size:13px;color:var(--tinta-2);backdrop-filter:blur(2px)}
.putar{width:34px;height:34px;border:3px solid var(--garis);border-top-color:var(--oranye);border-radius:50%;
  animation:putar .8s linear infinite}
@keyframes putar{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.putar{animation-duration:2s}}

:focus-visible{outline:3px solid var(--biru);outline-offset:2px}

/* ============================================================

function panggilGas(req) {
  return new Promise(function (resolve, reject) {
    if (window.GAS_API_URL) {
      fetch(window.GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(req),
        redirect: 'follow'
      })
        .then(function (r) { return r.json(); })
        .then(resolve)
        .catch(function (e) { reject(new Error('Gagal menghubungi server: ' + e.message)); });
      return;

    if (window.google && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function (e) { reject(new Error(e.message || 'Gagal menghubungi server.')); })

function api(action, payload) {
  return panggilGas({ action: action, payload: payload || {}, token: S.token })
    .then(function (res) {
      if (res && res.ok) return res.data;
      var pesan = (res && res.error) || 'Kesalahan tidak diketahui.';

/* ---------- GEODESI (jalan juga saat offline) ---------- */
function luasGeodesik(t) {
  if (t.length < 3) return 0;
  var total = 0;
  for (var i = 0; i < t.length; i++) {
    var a = t[i], b = t[(i + 1) % t.length];
    total += (b.lng - a.lng) * DEG * (2 + Math.sin(a.lat * DEG) + Math.sin(b.lat * DEG));
  }
  return Math.abs(total * R * R / 2);
}
function jarak(a, b) {
  var dLat = (b.lat - a.lat) * DEG, dLng = (b.lng - a.lng) * DEG;
  var s = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(a.lat * DEG) * Math.cos(b.lat * DEG) * Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return 2 * R * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
}
function keliling(t) {
  if (t.length < 2) return 0;
  var total = 0;
  for (var i = 0; i < t.length; i++) total += jarak(t[i], t[(i + 1) % t.length]);
  return total;
}
function azimuth(a, b) {
  var y = Math.sin((b.lng - a.lng) * DEG) * Math.cos(b.lat * DEG);
  var x = Math.cos(a.lat * DEG) * Math.sin(b.lat * DEG) -
          Math.sin(a.lat * DEG) * Math.cos(b.lat * DEG) * Math.cos((b.lng - a.lng) * DEG);
  return (Math.atan2(y, x) / DEG + 360) % 360;
}
function bersilangan(p1, p2, p3, p4) {
  function d(a, b, c) { return (b.lng - a.lng) * (c.lat - a.lat) - (b.lat - a.lat) * (c.lng - a.lng); }
  var d1 = d(p3, p4, p1), d2 = d(p3, p4, p2), d3 = d(p1, p2, p3), d4 = d(p1, p2, p4);
  return ((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) && ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0));
}
function periksaGeometri(t) {
  var masalah = [], n = t.length;
  if (n < 3) return masalah;
  for (var i = 0; i < n; i++) {
    for (var j = i + 2; j < n; j++) {
      if (i === 0 && j === n - 1) continue;
      if (bersilangan(t[i], t[(i + 1) % n], t[j], t[(j + 1) % n])) {
        masalah.push('Garis batas menyilang (titik ' + (i + 1) + ' dan ' + (j + 1) + ')');
      }
    }
  }
  return masalah;
}
function urutkanMelingkar(t) {
  var c = { lat: 0, lng: 0 };
  t.forEach(function (p) { c.lat += p.lat / t.length; c.lng += p.lng / t.length; });
  return t.slice().sort(function (a, b) {
    return Math.atan2(a.lat - c.lat, a.lng - c.lng) - Math.atan2(b.lat - c.lat, b.lng - c.lng);

function keUTM(lat, lng) {
  var zona = Math.floor((lng + 180) / 6) + 1;
  var a = 6378137, f = 1 / 298.257223563, k0 = 0.9996;
  var e2 = f * (2 - f), ep2 = e2 / (1 - e2);
  var phi = lat * DEG, lam = lng * DEG, lam0 = ((zona - 1) * 6 - 180 + 3) * DEG;
  var N = a / Math.sqrt(1 - e2 * Math.pow(Math.sin(phi), 2));
  var T = Math.pow(Math.tan(phi), 2), C = ep2 * Math.pow(Math.cos(phi), 2), A = Math.cos(phi) * (lam - lam0);
  var M = a * ((1 - e2 / 4 - 3 * e2 * e2 / 64 - 5 * Math.pow(e2, 3) / 256) * phi
    - (3 * e2 / 8 + 3 * e2 * e2 / 32 + 45 * Math.pow(e2, 3) / 1024) * Math.sin(2 * phi)
    + (15 * e2 * e2 / 256 + 45 * Math.pow(e2, 3) / 1024) * Math.sin(4 * phi)
    - (35 * Math.pow(e2, 3) / 3072) * Math.sin(6 * phi));
  var E = k0 * N * (A + (1 - T + C) * Math.pow(A, 3) / 6 +
    (5 - 18 * T + T * T + 72 * C - 58 * ep2) * Math.pow(A, 5) / 120) + 500000;
  var Nn = k0 * (M + N * Math.tan(phi) * (A * A / 2 + (5 - T + 9 * C + 4 * C * C) * Math.pow(A, 4) / 24
    + (61 - 58 * T + T * T + 600 * C - 330 * ep2) * Math.pow(A, 6) / 720));
  if (lat < 0) Nn += 10000000;
  return { zona: zona + (lat < 0 ? 'S' : 'N'), easting: E, northing: Nn };
}

/* ---------- TUMPANG TINDIH (versi klien) ---------- */
function dalamPoligon(p, poly) {
  var di = false;
  for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    var xi = poly[i].lng, yi = poly[i].lat, xj = poly[j].lng, yj = poly[j].lat;
    if (((yi > p.lat) !== (yj > p.lat)) &&
        (p.lng < (xj - xi) * (p.lat - yi) / ((yj - yi) || 1e-12) + xi)) di = !di;
  }
  return di;
}
function kotakBatas(poly) {
  var lats = poly.map(function (p) { return p.lat; });
  var lngs = poly.map(function (p) { return p.lng; });
  return { minLat: Math.min.apply(null, lats), maksLat: Math.max.apply(null, lats),
           minLng: Math.min.apply(null, lngs), maksLng: Math.max.apply(null, lngs) };
}
function kotakBersinggungan(a, b) {
  return !(a.maksLat < b.minLat || b.maksLat < a.minLat || a.maksLng < b.minLng || b.maksLng < a.minLng);
}
function luasIrisan(A, B, kisi) {
  kisi = kisi || 110;
  var ka = kotakBatas(A), kb = kotakBatas(B);
  var minLat = Math.max(ka.minLat, kb.minLat), maksLat = Math.min(ka.maksLat, kb.maksLat);
  var minLng = Math.max(ka.minLng, kb.minLng), maksLng = Math.min(ka.maksLng, kb.maksLng);
  if (minLat >= maksLat || minLng >= maksLng) return 0;
  var dLat = (maksLat - minLat) / kisi, dLng = (maksLng - minLng) / kisi;
  var luasSel = (dLat * 111320) * (dLng * 111320 * Math.cos((minLat + maksLat) / 2 * DEG));
  var n = 0;
  for (var i = 0; i < kisi; i++) {
    for (var j = 0; j < kisi; j++) {
      var p = { lat: minLat + (i + 0.5) * dLat, lng: minLng + (j + 0.5) * dLng };
      if (dalamPoligon(p, A) && dalamPoligon(p, B)) n++;
    }
  }
  return n * luasSel;
}
/** Perkiraan cepat untuk peringatan di lapangan. Angka resmi tetap dihitung server. */
function tumpangTindih(A, B) {
  var kosong = { tumpang: false, luas_m2: 0 };
  if (!A || !B || A.length < 3 || B.length < 3) return kosong;
  if (!kotakBersinggungan(kotakBatas(A), kotakBatas(B))) return kosong;
  var luas = luasIrisan(A, B, 110);
  if (luas < 0.5) return kosong;
  return { tumpang: true, luas_m2: Math.round(luas * 100) / 100 };
}

function gantiBasemap(idx) {
  if (idx === 'offline') {
    if (!S.mbtiles) { toast('Peta offline belum dimuat.', 'galat'); return; }
    if (lapisBasemap) S.peta.removeLayer(lapisBasemap);
    lapisBasemap = new LapisMbtiles(S.mbtiles.db, {
      mime: S.mbtiles.mime,
      minZoom: S.mbtiles.minzoom,
      maxZoom: 22,
      maxNativeZoom: S.mbtiles.maxzoom,
      attribution: 'MBTiles offline: ' + esc(S.mbtiles.nama)
    }).addTo(S.peta);
    S.basemapIdx = 'offline';
    localStorage.setItem('gu_basemap', 'offline');
    if (S.lapisPoligon) S.lapisPoligon.bringToFront();
    return;
  }
  S.basemapIdx = idx % BASEMAP.length;
  var b = BASEMAP[S.basemapIdx];
  if (lapisBasemap) S.peta.removeLayer(lapisBasemap);
  lapisBasemap = L.tileLayer(b.url, { maxZoom: b.maks, attribution: b.kredit }).addTo(S.peta);
  localStorage.setItem('gu_basemap', String(S.basemapIdx));
  if (S.lapisPoligon) S.lapisPoligon.bringToFront();
}

/* ============================================================
   PETA DASAR OFFLINE — MBTiles dibaca langsung di HP via sql.js
   Berkas .mbtiles disimpan di IndexedDB, jadi tetap ada setelah
   aplikasi ditutup dan sepenuhnya jalan tanpa sinyal.
   ============================================================ */
var PIKSEL_KOSONG = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
var SQLJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/';

var LapisMbtiles = L.TileLayer.extend({
  initialize: function (db, opsi) {
    this._db = db;
    L.TileLayer.prototype.initialize.call(this, '', opsi);
  },
  createTile: function (koor, selesai) {
    var img = document.createElement('img');
    img.setAttribute('role', 'presentation');
    try {
      // MBTiles memakai skema TMS: sumbu Y terbalik dari XYZ milik Leaflet.
      var y = Math.pow(2, koor.z) - 1 - koor.y;
      var st = this._db.prepare('SELECT tile_data FROM tiles WHERE zoom_level=? AND tile_column=? AND tile_row=?');
      st.bind([koor.z, koor.x, y]);
      img.src = st.step()
        ? 'data:' + this.options.mime + ';base64,' + bytesKeBase64(st.getAsObject().tile_data)
        : PIKSEL_KOSONG;
      st.free();
    } catch (e) {
      img.src = PIKSEL_KOSONG;
    }
    img.onload = function () { selesai(null, img); };
    img.onerror = function () { selesai(null, img); };
    return img;
  }
});

function bytesKeBase64(bytes) {
  var biner = '', potong = 8192;
  for (var i = 0; i < bytes.length; i += potong) {
    biner += String.fromCharCode.apply(null, bytes.subarray(i, i + potong));
  }
  return btoa(biner);
}

/* --- IndexedDB: simpan berkas .mbtiles mentah --- */
function idb() {
  return new Promise(function (res, rej) {
    var r = indexedDB.open('geoukur', 1);
    r.onupgradeneeded = function () { r.result.createObjectStore('peta'); };
    r.onsuccess = function () { res(r.result); };
    r.onerror = function () { rej(new Error('IndexedDB tidak tersedia di browser ini.')); };
  });
}
function idbTulis(kunci, nilai) {
  return idb().then(function (db) {
    return new Promise(function (res, rej) {
      var tx = db.transaction('peta', 'readwrite');
      tx.objectStore('peta').put(nilai, kunci);
      tx.oncomplete = function () { res(true); };
      tx.onerror = function () { rej(new Error('Gagal menyimpan ke penyimpanan lokal (mungkin memori penuh).')); };
    });
  });
}
function idbBaca(kunci) {
  return idb().then(function (db) {
    return new Promise(function (res, rej) {
      var q = db.transaction('peta', 'readonly').objectStore('peta').get(kunci);
      q.onsuccess = function () { res(q.result || null); };
      q.onerror = function () { rej(new Error('Gagal membaca penyimpanan lokal.')); };
    });
  });
}
function idbHapus(kunci) {
  return idb().then(function (db) {
    return new Promise(function (res) {
      var tx = db.transaction('peta', 'readwrite');
      tx.objectStore('peta').delete(kunci);
      tx.oncomplete = function () { res(true); };
    });
  });
}

/* --- sql.js dimuat sekali, lalu di-cache oleh browser --- */
var sqlSiap = null;
function muatSqlJs() {
  if (sqlSiap) return sqlSiap;
  sqlSiap = new Promise(function (res, rej) {
    if (window.initSqlJs) return res(window.initSqlJs);
    var s = document.createElement('script');
    s.src = SQLJS_CDN + 'sql-wasm.js';
    s.onload = function () { res(window.initSqlJs); };
    s.onerror = function () {
      sqlSiap = null;
      rej(new Error('Mesin peta offline gagal dimuat. Sambungkan internet sekali untuk mengunduhnya.'));
    };
    document.head.appendChild(s);
  }).then(function (init) {
    return init({ locateFile: function (f) { return SQLJS_CDN + f; } });
  });
  return sqlSiap;
}

/** Buka ArrayBuffer .mbtiles → siapkan S.mbtiles */
function siapkanMbtiles(buffer, nama) {
  return muatSqlJs().then(function (SQL) {
    var db = new SQL.Database(new Uint8Array(buffer));

    // Validasi: harus ada tabel tiles
    var cek = db.exec("SELECT name FROM sqlite_master WHERE type IN ('table','view') AND name='tiles'");
    if (!cek.length) throw new Error('Berkas ini bukan MBTiles yang sah (tabel "tiles" tidak ditemukan).');

    var meta = {};
    try {
      var m = db.exec('SELECT name, value FROM metadata');
      if (m.length) m[0].values.forEach(function (r) { meta[String(r[0]).toLowerCase()] = r[1]; });
    } catch (e) {}

    var z = db.exec('SELECT MIN(zoom_level), MAX(zoom_level) FROM tiles');
    var zMin = meta.minzoom !== undefined ? parseInt(meta.minzoom, 10) : (z.length ? z[0].values[0][0] : 0);
    var zMaks = meta.maxzoom !== undefined ? parseInt(meta.maxzoom, 10) : (z.length ? z[0].values[0][1] : 18);
    var jml = db.exec('SELECT COUNT(*) FROM tiles');
    var format = String(meta.format || 'png').toLowerCase();

    S.mbtiles = {
      db: db,
      nama: meta.name || nama,
      mime: format.indexOf('jpg') === 0 || format === 'jpeg' ? 'image/jpeg' : (format === 'webp' ? 'image/webp' : 'image/png'),
      minzoom: zMin,
      maxzoom: zMaks,
      jumlah_ubin: jml.length ? jml[0].values[0][0] : 0,
      bounds: meta.bounds ? String(meta.bounds).split(',').map(parseFloat) : null
    };
    return S.mbtiles;
  });
}

/** Muat ulang dari IndexedDB saat aplikasi dibuka (dipanggil sekali). */
function pulihkanMbtiles() {
  if (S.mbtiles || S.mbtilesDicoba) return Promise.resolve(null);
  S.mbtilesDicoba = true;
  return idbBaca('mbtiles')
    .then(function (rek) {
      if (!rek || !rek.data) return null;
      return siapkanMbtiles(rek.data, rek.nama);
    })
    .catch(function () { return null; });
}

$('inputMbtiles').onchange = function (e) {
  var berkas = e.target.files[0];
  if (!berkas) return;
  var mb = berkas.size / 1048576;
  if (mb > 300) { toast('Berkas ' + mb.toFixed(0) + ' MB terlalu besar. Potong dulu areanya (maks ~300 MB).', 'galat'); return; }

  tunggu(true, 'Membaca ' + mb.toFixed(1) + ' MB peta offline...');
  var pembaca = new FileReader();
  pembaca.onload = function () {
    var buffer = pembaca.result;
    siapkanMbtiles(buffer, berkas.name)
      .then(function (mt) {
        tunggu(true, 'Menyimpan peta offline di perangkat...');
        return idbTulis('mbtiles', { nama: mt.nama, data: buffer, ukuran: berkas.size, dibuat: Date.now() });
      })
      .then(function () {
        gantiBasemap('offline');
        if (S.mbtiles.bounds && S.mbtiles.bounds.length === 4) {
          var b = S.mbtiles.bounds; // barat, selatan, timur, utara
          S.ikuti = false;
          $('btnIkuti').classList.remove('nyala');
          S.peta.fitBounds([[b[1], b[0]], [b[3], b[2]]]);
        }
        tutupLembar();
        toast('Peta offline aktif: ' + S.mbtiles.jumlah_ubin + ' ubin, zoom ' +
              S.mbtiles.minzoom + '-' + S.mbtiles.maxzoom + '.', 'sukses');
      })
      .catch(function (err) { toast(err.message, 'galat'); })
      .then(function () { tunggu(false); $('inputMbtiles').value = ''; });
  };
  pembaca.onerror = function () { tunggu(false); toast('Gagal membaca berkas.', 'galat'); };
  pembaca.readAsArrayBuffer(berkas);
};

function bisaTulis() { return S.pengguna && S.pengguna.role !== 'viewer'; }

/* ---------- GAMBAR PETA ---------- */
function gambarPeta(paskan) {
  if (!S.aktif || !S.peta) return;
  var T = S.aktif.titik;

  S.lapisTitik.clearLayers();
  S.penanda = {};
  if (S.lapisPoligon) { S.peta.removeLayer(S.lapisPoligon); S.lapisPoligon = null; }

  if (T.length >= 2) {
    var koor = T.map(function (t) { return [t.lat, t.lng]; });
    S.lapisPoligon = (T.length >= 3)
      ? L.polygon(koor, { color: '#E8590C', weight: 3, fillOpacity: 0.18 })
      : L.polyline(koor, { color: '#E8590C', weight: 3, dashArray: '6,6' });
    S.lapisPoligon.addTo(S.peta);
  }

  var tol = S.config.toleransi_akurasi || 10;
  var tiap = S.config.label_tiap || 5;
  var padat = T.length > 25; // jalur rekam otomatis: jangan penuhi peta dengan nomor

  T.forEach(function (t, i) {
    var buram = t.akurasi && t.akurasi > tol;
    var tunda = S.antrean.some(function (o) { return o.titik && o.titik.titik_id === t.titik_id; });
    var otomatis = t.sumber === 'auto';
    var berlabel = !otomatis || (i % tiap === 0);
    var kecil = otomatis && !berlabel;
    var ikon = L.divIcon({
      className: '',
      html: '<div class="penanda' + (kecil ? ' kecil' : '') + (buram ? ' buram' : '') +
            (tunda ? ' tunda' : '') + '">' + (kecil ? '' : (i + 1)) + '</div>',
      iconSize: kecil ? [12, 12] : [26, 26], iconAnchor: kecil ? [6, 6] : [13, 13]
    });
    var m = L.marker([t.lat, t.lng], {
      icon: ikon,
      draggable: bisaTulis() && !S.kunciTitik
    }).addTo(S.lapisTitik);

    m.on('click', function () { detailTitik(t); });
    m.on('dragstart', function (e) { e.target._asal = { lat: t.lat, lng: t.lng }; });
    m.on('dragend', function (e) { konfirmasiGeser(e.target, t); });
    S.penanda[t.titik_id] = m;

    // label panjang sisi — hanya kalau titiknya belum terlalu rapat
    if (!padat && T.length >= 2 && (T.length > 2 || i === 0)) {
      var b = T[(i + 1) % T.length];
      L.marker([(t.lat + b.lat) / 2, (t.lng + b.lng) / 2], {
        interactive: false,
        icon: L.divIcon({
          className: '',
          html: '<div style="font:700 10px ui-monospace,monospace;background:rgba(255,255,255,.92);' +
                'padding:1px 4px;border-radius:4px;white-space:nowrap;color:#14181F;transform:translate(-50%,-50%)">' +
                jarak(t, b).toFixed(1) + ' m</div>',
          iconSize: [0, 0]
        })
      }).addTo(S.lapisTitik);
    }
  });

  perbaruiPapan();
  if (S.kolaborasi && S.lapisTetangga) gambarTetangga();

  if (paskan && T.length) {
    try {
      S.ikuti = false;
      $('btnIkuti').classList.remove('nyala');
      S.peta.fitBounds(L.latLngBounds(T.map(function (t) { return [t.lat, t.lng]; })).pad(0.3));
    } catch (e) {}
  }
}

/**
 * Titik yang tergeser tidak pernah langsung tersimpan.
 * 1. Geseran mikro (< 0,5 m) = jempol menyenggol layar -> dikembalikan diam-diam.
 * 2. Geseran nyata -> minta konfirmasi, tampilkan jaraknya. Kalau ditolak,
 *    penanda dan datanya kembali ke posisi semula, dan tidak ada yang dikirim ke server.
 */
function konfirmasiGeser(penanda, t) {
  var asal = penanda._asal || { lat: t.lat, lng: t.lng };
  var baru = penanda.getLatLng();
  var geser = jarak(asal, { lat: baru.lat, lng: baru.lng });

  function kembalikan(pesan, jenis) {
    t.lat = asal.lat; t.lng = asal.lng;
    penanda.setLatLng([asal.lat, asal.lng]);
    gambarPeta();
    if (pesan) toast(pesan, jenis);
  }

  if (!bolehEdit()) { kembalikan('Titik dikembalikan — lahan tidak bisa diedit.', 'galat'); return; }

  if (geser < 0.5) { kembalikan(); return; } // senggolan jempol, bukan niat menggeser

  var nama = t.kode_patok || ('titik #' + t.urutan);
  var pesan = 'Geser ' + nama + ' sejauh ' + geser.toFixed(1) + ' m?\n\n' +
    'Dari : ' + asal.lat.toFixed(6) + ', ' + asal.lng.toFixed(6) + '\n' +
    'Ke   : ' + baru.lat.toFixed(6) + ', ' + baru.lng.toFixed(6) + '\n\n' +
    (t.akurasi ? 'Titik ini terekam GPS dengan akurasi ' + t.akurasi + ' m.\n' : '') +
    'Pilih Batal kalau tidak sengaja tergeser.';

  if (!confirm(pesan)) { kembalikan('Geseran dibatalkan. Titik kembali ke posisi semula.'); return; }

  t.lat = baru.lat;
  t.lng = baru.lng;
  t.sumber = 'manual';
  gambarPeta();
  simpanTitikKeServer(t).then(function () {
    toast(nama + ' digeser ' + geser.toFixed(1) + ' m.', 'sukses');
  });
}

function perbaruiPapan() {

  perbaruiBilahStatus();

  }
}

/* ---------- GPS ---------- */
function mulaiGps() {
  if (S.watchId !== null || !navigator.geolocation) return;
  S.watchId = navigator.geolocation.watchPosition(function (pos) {
    S.posisi = pos;
    var c = pos.coords;
    $('bacaAkurasi').textContent = c.accuracy ? c.accuracy.toFixed(1) : '-';
    if (!sedangMerekam) $('rekamSub').textContent = 'GPS ' + (c.accuracy || 0).toFixed(1) + ' m';
    $('btnRekam').disabled = false;

    if (!S.peta) return;
    var ll = [c.latitude, c.longitude];
    if (!S.penandaGps) {
      S.penandaGps = L.circleMarker(ll, { radius: 7, color: '#fff', weight: 2, fillColor: '#1B6AA8', fillOpacity: 1 }).addTo(S.peta);
      S.lingkaranGps = L.circle(ll, { radius: c.accuracy || 10, color: '#1B6AA8', weight: 1, fillOpacity: 0.12 }).addTo(S.peta);
    } else {
      S.penandaGps.setLatLng(ll);
      S.lingkaranGps.setLatLng(ll).setRadius(c.accuracy || 10);
    }
    if (S.ikuti) S.peta.setView(ll, Math.max(S.peta.getZoom(), 17), { animate: false });

    if (S.autoRekam) {
      var baru = { lat: c.latitude, lng: c.longitude };
      if (!S.titikAutoTerakhir || jarak(S.titikAutoTerakhir, baru) >= S.autoJarak) {
        S.titikAutoTerakhir = baru;
        tambahTitik({ lat: c.latitude, lng: c.longitude, elevasi: c.altitude, akurasi: c.accuracy, sumber: 'auto' }, true);
      }
    }
  }, function (err) {
    $('rekamSub').textContent = 'GPS tidak aktif';
    toast('GPS: ' + err.message + '. Aktifkan izin lokasi di browser.', 'galat');
  }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 20000 });
}

$('btnIkuti').onclick = function () {
  S.ikuti = !S.ikuti;
  $('btnIkuti').classList.toggle('nyala', S.ikuti);
  if (S.ikuti && S.posisi) S.peta.setView([S.posisi.coords.latitude, S.posisi.coords.longitude], 18);
};
$('btnModeTap').onclick = function () {
  S.modeTap = !S.modeTap;
  $('btnModeTap').classList.toggle('nyala', S.modeTap);
  toast(S.modeTap ? 'Ketuk peta untuk menaruh titik.' : 'Mode ketuk peta dimatikan.');
};

/* ---------- REKAM TITIK (rata-rata sampel = lebih presisi) ---------- */
var sedangMerekam = false;

$('btnRekam').onclick = function () { rekamGps(parseInt(localStorage.getItem('gu_sampel') || '5', 10)); };

function rekamGps(jumlahSampel) {
  if (!S.aktif) { toast('Buka lahan dulu.', 'galat'); return; }
  if (!bolehEdit()) return;
  if (!navigator.geolocation) { toast('Perangkat tidak mendukung GPS.', 'galat'); return; }
  if (sedangMerekam) return;

  jumlahSampel = Math.max(1, jumlahSampel || 1);
  sedangMerekam = true;
  var btn = $('btnRekam');
  btn.classList.add('merekam');
  var sampel = [];

  function ambil() {
    navigator.geolocation.getCurrentPosition(function (pos) {
      sampel.push(pos.coords);
      $('rekamSub').textContent = 'Sampel ' + sampel.length + '/' + jumlahSampel;
      if (sampel.length < jumlahSampel) setTimeout(ambil, 900);
      else rampung();
    }, function (err) {
      selesaiRekam();
      toast('Gagal mengambil posisi: ' + err.message, 'galat');
    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
  }

  function rampung() {
    // rata-rata berbobot: sampel dengan akurasi lebih baik diberi bobot lebih besar
    var totBobot = 0, lat = 0, lng = 0, elev = 0, adaElev = 0, akMin = Infinity;
    sampel.forEach(function (c) {
      var bobot = 1 / Math.max(1, c.accuracy || 10);
      totBobot += bobot;
      lat += c.latitude * bobot;
      lng += c.longitude * bobot;
      if (c.altitude !== null && c.altitude !== undefined) { elev += c.altitude; adaElev++; }
      if (c.accuracy && c.accuracy < akMin) akMin = c.accuracy;
    });
    var akRata = sampel.reduce(function (a, c) { return a + (c.accuracy || 0); }, 0) / sampel.length;
    tambahTitik({
      lat: lat / totBobot,
      lng: lng / totBobot,
      elevasi: adaElev ? Math.round(elev / adaElev * 10) / 10 : null,
      akurasi: Math.round(akRata * 10) / 10,
      sumber: 'gps'
    });
    selesaiRekam();
  }

  function selesaiRekam() {
    sedangMerekam = false;
    btn.classList.remove('merekam');
    $('rekamSub').textContent = S.posisi ? 'GPS ' + (S.posisi.coords.accuracy || 0).toFixed(1) + ' m' : 'GPS siap';
  }

  ambil();
}

/* Rekam otomatis sambil berjalan menyusuri batas */
$('btnAutoRekam').onclick = function () {
  if (!S.aktif || !bolehEdit()) return;
  if (S.autoRekam) {
    S.autoRekam = false;
    S.titikAutoTerakhir = null;
    $('btnAutoRekam').classList.remove('nyala');
    toast('Rekam otomatis dimatikan.');
    return;
  }
  var jrk = prompt('Rekam titik otomatis setiap berapa meter berjalan?', String(S.autoJarak));
  if (jrk === null) return;
  var n = parseFloat(jrk);
  if (!isFinite(n) || n < 2) { toast('Isi minimal 2 meter.', 'galat'); return; }
  S.autoJarak = n;
  S.autoRekam = true;
  S.titikAutoTerakhir = null;
  $('btnAutoRekam').classList.add('nyala');
  toast('Rekam otomatis aktif: titik baru setiap ' + n + ' m. Jalan menyusuri batas.', 'sukses');
};

/* ---------- TAMBAH / SIMPAN TITIK ---------- */
function tambahTitik(t, senyap) {
  var T = S.aktif.titik;
  var tol = S.config.toleransi_akurasi || 10;

  var titik = {
    titik_id: uid('ttk'),
    lahan_id: S.aktif.lahan.lahan_id,
    urutan: T.length + 1,
    kode_patok: 'T' + (T.length + 1),
    lat: t.lat, lng: t.lng,
    elevasi: (t.elevasi === undefined || t.elevasi === null) ? null : Math.round(t.elevasi * 10) / 10,
    akurasi: (t.akurasi === undefined || t.akurasi === null) ? null : Math.round(t.akurasi * 100) / 100,
    sumber: t.sumber || 'gps',
    catatan: '',
    dibuat_pada: new Date().toISOString()
  };

  T.push(titik);
  gambarPeta();
  simpanTitikKeServer(titik);

  if (!senyap) {
    var pesan = 'Titik ' + titik.kode_patok + ' terekam';
    if (titik.akurasi) pesan += ' (akurasi ' + titik.akurasi + ' m)';
    toast(pesan, titik.akurasi && titik.akurasi > tol ? 'galat' : 'sukses');
    if (titik.akurasi && titik.akurasi > tol) {
      toast('Akurasi di atas toleransi ' + tol + ' m. Tunggu sinyal membaik lalu rekam ulang titik ini.', 'galat');
    }
  }
}

function simpanTitikKeServer(titik) {
  var salinan = JSON.parse(JSON.stringify(titik));
  if (!navigator.onLine) {
    antrekan({ jenis: 'simpanTitik', lahan_id: S.aktif.lahan.lahan_id, titik: salinan });
    gambarPeta();
    return Promise.resolve();
  }
  return api('simpanTitik', { lahan_id: S.aktif.lahan.lahan_id, titik: salinan })
    .then(function () { perbaruiPapan(); })
    .catch(function (e) {
      antrekan({ jenis: 'simpanTitik', lahan_id: S.aktif.lahan.lahan_id, titik: salinan });
      toast('Server tidak terjangkau. Titik masuk antrean sinkron.', 'galat');
      gambarPeta();
    });
}

function hapusTitikLokal(t) {
  if (!bolehEdit()) return;
  if (!confirm('Hapus titik ' + (t.kode_patok || '') + '?')) return;
  S.aktif.titik = S.aktif.titik.filter(function (x) { return x.titik_id !== t.titik_id; });
  S.aktif.titik.forEach(function (x, i) { x.urutan = i + 1; });
  gambarPeta();
  tutupLembar();

  if (!navigator.onLine) {
    antrekan({ jenis: 'hapusTitik', lahan_id: S.aktif.lahan.lahan_id, titik_id: t.titik_id });
    return;
  }
  api('hapusTitik', { lahan_id: S.aktif.lahan.lahan_id, titik_id: t.titik_id })
    .then(function () { toast('Titik dihapus.'); })
    .catch(function (e) {
      antrekan({ jenis: 'hapusTitik', lahan_id: S.aktif.lahan.lahan_id, titik_id: t.titik_id });
      toast('Masuk antrean sinkron.', 'galat');
    });
}

/* ---------- DETAIL SATU TITIK ---------- */
function detailTitik(t) {
  var u = keUTM(t.lat, t.lng);
  var i = S.aktif.titik.indexOf(t);
  var berikut = S.aktif.titik[(i + 1) % S.aktif.titik.length];
  var sisi = (S.aktif.titik.length >= 2 && berikut)
    ? jarak(t, berikut).toFixed(2) + ' m, azimut ' + azimuth(t, berikut).toFixed(1) + ' derajat'
    : '-';

  bukaLembar('Titik ' + (i + 1),
    '<table class="tabel">' +
    '<tr><th>Kode patok</th><td>' + esc(t.kode_patok || '-') + '</td></tr>' +
    '<tr><th>Lintang</th><td class="num">' + t.lat.toFixed(7) + '</td></tr>' +
    '<tr><th>Bujur</th><td class="num">' + t.lng.toFixed(7) + '</td></tr>' +
    '<tr><th>UTM ' + esc(u.zona) + '</th><td class="num">' + u.easting.toFixed(2) + ' E / ' + u.northing.toFixed(2) + ' N</td></tr>' +
    '<tr><th>Elevasi</th><td class="num">' + (t.elevasi != null ? t.elevasi + ' m' : '-') + '</td></tr>' +
    '<tr><th>Akurasi</th><td class="num">' + (t.akurasi != null ? t.akurasi + ' m' : '-') + '</td></tr>' +
    '<tr><th>Ke titik berikut</th><td class="num">' + esc(sisi) + '</td></tr>' +
    '<tr><th>Sumber</th><td>' + esc(t.sumber) + '</td></tr>' +
    '</table>' +
    '<div class="grup" style="margin-top:14px"><label class="lbl">Kode patok</label>' +
      '<input id="tKode" class="inp" value="' + esc(t.kode_patok || '') + '"></div>' +
    '<div class="grup"><label class="lbl">Catatan lapangan</label>' +

function jalankanAlat(aksi) {
  var L0 = S.aktif.lahan;
  if (aksi === 'ubah') return formLahan(L0);
  if (aksi === 'status') return formStatus();
  if (aksi === 'perbaiki') return perbaikiGeometri();
  if (aksi === 'impor') { tutupLembar(); $('inputImpor').click(); return; }
  if (aksi === 'ekspor') return menuEkspor();
  if (aksi === 'pdf') return cetakPdf();
  if (aksi === 'foto') return panelFoto();
  if (aksi === 'ttd') return panelTtd();
  if (aksi === 'kunci') { tutupLembar(); $('btnKunci').click(); return; }
  if (aksi === 'tumpang') return panelTumpang();
  if (aksi === 'kolab') { tutupLembar(); $('btnKolab').click(); return; }
  if (aksi === 'tap') { tutupLembar(); $('btnModeTap').click(); return; }

      localStorage.getItem('gu_sampel') || '5');

      tutupLembar();

  }
  if (aksi === 'hapus') {
    if (!confirm('Arsipkan lahan "' + L0.nama + '"? Data tetap tersimpan di Sheet, hanya disembunyikan.')) return;

/** Foto profil dipotong jadi persegi (dari tengah) lalu diperkecil ke 160 px. */
function kompresAvatar(berkas) {
  return new Promise(function (resolve, reject) {
    var img = new Image();
    var pembaca = new FileReader();
    pembaca.onload = function () { img.src = pembaca.result; };
    pembaca.onerror = function () { reject(new Error('Gagal membaca berkas.')); };
    img.onerror = function () { reject(new Error('Format gambar tidak didukung.')); };
    img.onload = function () {
      var sisi = Math.min(img.width, img.height);
      var sx = (img.width - sisi) / 2, sy = (img.height - sisi) / 2;
      var k = document.createElement('canvas');
      k.width = 160; k.height = 160;
      k.getContext('2d').drawImage(img, sx, sy, sisi, sisi, 0, 0, 160, 160);

      var mutu = 0.8;
      var data = k.toDataURL('image/jpeg', mutu);
      while (data.length > 44000 && mutu > 0.35) {
        mutu -= 0.1;
        data = k.toDataURL('image/jpeg', mutu);
      }
      if (data.length > 44000) return reject(new Error('Foto terlalu besar. Coba gambar lain.'));
      resolve(data);
    };
    pembaca.readAsDataURL(berkas);
  });
}

function kompresLogo(berkas) {
  return new Promise(function (resolve, reject) {
    var img = new Image();
    var pembaca = new FileReader();
    pembaca.onload = function () { img.src = pembaca.result; };
    pembaca.onerror = function () { reject(new Error('Gagal membaca berkas.')); };
    img.onerror = function () { reject(new Error('Format gambar tidak didukung.')); };
    img.onload = function () {
      var skala = Math.min(1, 320 / Math.max(img.width, img.height));
      var k = document.createElement('canvas');
      k.width = Math.max(1, Math.round(img.width * skala));
      k.height = Math.max(1, Math.round(img.height * skala));
      var ctx = k.getContext('2d');
      ctx.drawImage(img, 0, 0, k.width, k.height);

      var png = k.toDataURL('image/png');
      if (png.length <= 44000) return resolve(png);

      ctx.globalCompositeOperation = 'destination-over';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, k.width, k.height);
      var mutu = 0.85;
      var jpg = k.toDataURL('image/jpeg', mutu);
      while (jpg.length > 44000 && mutu > 0.4) {
        mutu -= 0.1;
        jpg = k.toDataURL('image/jpeg', mutu);
      }
      if (jpg.length > 44000) return reject(new Error('Logo terlalu rumit. Pakai gambar yang lebih sederhana.'));
      resolve(jpg);
    };
    pembaca.readAsDataURL(berkas);
  });
}

function kompresGambar(berkas, maksSisi, mutu) {
  return new Promise(function (resolve, reject) {
    var img = new Image();
    var pembaca = new FileReader();
    pembaca.onload = function () { img.src = pembaca.result; };
    pembaca.onerror = function () { reject(new Error('Gagal membaca berkas.')); };
    img.onload = function () {
      var skala = Math.min(1, maksSisi / Math.max(img.width, img.height));
      var kanvas = document.createElement('canvas');
      kanvas.width = Math.round(img.width * skala);
      kanvas.height = Math.round(img.height * skala);
      kanvas.getContext('2d').drawImage(img, 0, 0, kanvas.width, kanvas.height);
      resolve(kanvas.toDataURL('image/jpeg', mutu));
    };
    img.onerror = function () { reject(new Error('Format gambar tidak didukung.')); };
    pembaca.readAsDataURL(berkas);
  });
}

/* ============================================================
   KOLABORASI: rekan surveyor & bidang sekitar di peta yang sama
   Denyut nadi tiap 10 detik: kirim posisi sendiri, terima posisi rekan
   dan daftar bidang di sekitar. Koordinat bidang hanya diambil ulang
   kalau versinya berubah — supaya hemat kuota dan baterai.
   ============================================================ */
var JEDA_DENYUT = 10000;

function warnaDari(teks) {
  var h = 0;
  for (var i = 0; i < teks.length; i++) h = (h * 31 + teks.charCodeAt(i)) % 360;
  return 'hsl(' + h + ',68%,42%)';
}
function inisial(nama) {
  return String(nama || '?').trim().split(/\s+/).slice(0, 2)
    .map(function (k) { return k.charAt(0).toUpperCase(); }).join('');
}

$('btnKolab').onclick = function () {
  S.kolaborasi = !S.kolaborasi;
  localStorage.setItem('gu_kolab', S.kolaborasi ? '1' : '0');
  $('btnKolab').classList.toggle('nyala', S.kolaborasi);
  if (S.kolaborasi) {
    mulaiDenyut();
    toast('Kolaborasi aktif. Rekan surveyor dan bidang sekitar akan muncul di peta.', 'sukses');
  } else {
    hentikanDenyut(true);
    toast('Kolaborasi dimatikan. Lokasi Anda tidak lagi dibagikan.');
  }
};

function mulaiDenyut() {
  if (!S.kolaborasi || !S.aktif) return;
  if (!S.lapisRekan) S.lapisRekan = L.layerGroup().addTo(S.peta);
  if (!S.lapisTetangga) S.lapisTetangga = L.layerGroup().addTo(S.peta);
  clearInterval(S.timerDenyut);
  denyut();
  S.timerDenyut = setInterval(denyut, JEDA_DENYUT);
}

function hentikanDenyut(bersihkan) {
  clearInterval(S.timerDenyut);
  S.timerDenyut = null;
  if (bersihkan) {
    // beri tahu server supaya penanda kita hilang dari peta rekan
    if (navigator.onLine) api('denyut', { device_id: S.deviceId, berbagi: false }).catch(function () {});
    if (S.lapisRekan) S.lapisRekan.clearLayers();
    if (S.lapisTetangga) S.lapisTetangga.clearLayers();
    S.konflik = [];
    $('peringatanTumpang').classList.add('tersembunyi');
  }
}

function denyut() {
  if (!S.kolaborasi || !S.aktif || !navigator.onLine) return;
  var c = S.posisi ? S.posisi.coords : null;

  api('denyut', {
    device_id: S.deviceId,
    lahan_id: S.aktif.lahan.lahan_id,
    lahan_nama: S.aktif.lahan.nama,
    berbagi: S.berbagiLokasi,
    lat: c ? c.latitude : '',
    lng: c ? c.longitude : '',
    akurasi: c ? c.accuracy : ''
  })
    .then(function (d) {
      gambarRekan(d.rekan || []);
      return segarkanTetangga(d.tetangga || []);
    })
    .catch(function (e) { /* denyut gagal itu wajar di lapangan — coba lagi 10 detik lagi */ });
}

function avatarHtml(username, nama, ukuran) {
  var a = S.avatar[username];
  var warna = warnaDari(username);
  if (a && a.foto) return '<img src="' + esc(a.foto) + '" alt="' + esc(nama) + '">';
  return '<span style="background:' + warna + ';width:100%;height:100%;display:grid;place-items:center">' +
         esc(inisial(nama)) + '</span>';
}

/** Ambil foto profil rekan yang belum ada di cache (sekali per username). */
function pastikanAvatar(usernames) {
  var perlu = usernames.filter(function (u) { return !S.avatar[u]; });
  if (!perlu.length) return Promise.resolve();
  return api('ambilAvatar', { usernames: perlu })
    .then(function (d) {
      Object.keys(d).forEach(function (u) { S.avatar[u] = d[u]; });
      try { localStorage.setItem('gu_avatar', JSON.stringify(S.avatar)); } catch (e) { /* penuh: abaikan */ }
    })
    .catch(function () {});
}

function gambarRekan(rekan) {
  var baru = rekan.map(function (r) { return r.username; });
  pastikanAvatar(baru).then(function () { lukisRekan(rekan); });
}

function lukisRekan(rekan) {
  S.lapisRekan.clearLayers();

  rekan.forEach(function (r) {
    var warna = warnaDari(r.username);
    var basi = r.detik_lalu > 45;

    // lingkaran akurasi digambar lebih dulu, penanda menimpanya
    if (r.akurasi) {
      L.circle([r.lat, r.lng], { radius: r.akurasi, color: warna, weight: 1.5, fillOpacity: 0.10 })
        .addTo(S.lapisRekan);
    }

    var ikon = L.divIcon({
      className: '',
      html: '<div class="rekan' + (basi ? ' basi' : '') + '">' +
            '<div class="bulat-rekan" style="background:' + warna + '">' +
            avatarHtml(r.username, r.nama) + '</div>' +
            '<div class="nama-rekan">' + esc(String(r.nama).split(' ')[0]) +
            (r.lahan_nama ? ' &middot; ' + esc(r.lahan_nama) : '') + '</div></div>',
      iconSize: [34, 34],      // ukuran nyata -> bulatan tidak gepeng
      iconAnchor: [17, 17]     // jangkar di tengah -> tepat di pusat lingkaran akurasi
    });

    L.marker([r.lat, r.lng], { icon: ikon, zIndexOffset: 600, riseOnHover: true })
      .addTo(S.lapisRekan)
      .on('click', function () { infoRekan(r); });
  });
}

function infoRekan(r) {

/** Ambil koordinat bidang tetangga hanya untuk yang baru / berubah. */
function segarkanTetangga(daftar) {
  var perluAmbil = daftar.filter(function (l) {
    var c = S.cacheTetangga[l.lahan_id];
    return !c || c.versi !== l.versi;
  }).map(function (l) { return l.lahan_id; });

  // buang bidang yang sudah tidak dilaporkan lagi
  Object.keys(S.cacheTetangga).forEach(function (id) {
    if (!daftar.some(function (l) { return l.lahan_id === id; })) delete S.cacheTetangga[id];
  });
  daftar.forEach(function (l) {
    if (S.cacheTetangga[l.lahan_id]) S.cacheTetangga[l.lahan_id].info = l;
  });

  if (!perluAmbil.length) { gambarTetangga(); return Promise.resolve(); }

  return api('poligon', { ids: perluAmbil.slice(0, 20) })
    .then(function (poligon) {
      daftar.forEach(function (l) {
        if (poligon[l.lahan_id]) {
          S.cacheTetangga[l.lahan_id] = { versi: l.versi, poly: poligon[l.lahan_id], info: l };
        }
      });
      gambarTetangga();
    })
    .catch(function () { gambarTetangga(); });
}

function gambarTetangga() {
  if (!S.lapisTetangga) return;
  S.lapisTetangga.clearLayers();

  var saya = S.aktif.titik.map(function (t) { return { lat: t.lat, lng: t.lng }; });
  S.konflik = [];

  Object.keys(S.cacheTetangga).forEach(function (id) {
    var c = S.cacheTetangga[id];
    if (!c.poly || c.poly.length < 3) return;

    var tt = tumpangTindih(saya, c.poly);
    if (tt.tumpang) {
      S.konflik.push({
        lahan_id: id, nama: c.info.nama, surveyor: c.info.surveyor,
        status: c.info.status, luas_m2: tt.luas_m2,
        persen_saya: saya.length >= 3 ? Math.round(tt.luas_m2 / luasGeodesik(saya) * 1000) / 10 : 0
      });
    }

    var warna = tt.tumpang ? '#B42318' : '#1B6AA8';
    var poli = L.polygon(c.poly.map(function (p) { return [p.lat, p.lng]; }), {
      color: warna, weight: 2, dashArray: tt.tumpang ? null : '6,5',
      fillOpacity: tt.tumpang ? 0.28 : 0.06
    }).addTo(S.lapisTetangga);

    poli.on('click', function () { infoTetangga(c, tt); });

    var pusat = poli.getBounds().getCenter();
    L.marker(pusat, {
      interactive: false,
      icon: L.divIcon({
        className: '',
        html: '<div class="label-bidang' + (tt.tumpang ? ' bentrok' : '') + '">' +
              esc(c.info.nama) + ' &middot; ' + esc(String(c.info.surveyor || '').split(' ')[0]) + '</div>',
        iconSize: [0, 0]
      })
    }).addTo(S.lapisTetangga);
  });

  perbaruiPeringatanTumpang();
}

function infoTetangga(c, tt) {
  bukaLembar('Bidang: ' + c.info.nama,
    '<table class="tabel">' +
    '<tr><th>Surveyor</th><td>' + esc(c.info.surveyor || '-') + '</td></tr>' +
    '<tr><th>Status</th><td>' + esc(c.info.status) + '</td></tr>' +
    '<tr><th>Luas</th><td class="num">' + (c.info.luas_ha || 0).toFixed(4) + ' ha</td></tr>' +
    '<tr><th>Jumlah titik</th><td class="num">' + c.info.jumlah_titik + '</td></tr>' +
    (tt.tumpang
      ? '<tr><th>Tumpang tindih</th><td class="num" style="color:var(--merah);font-weight:700">' +
        tt.luas_m2.toFixed(2) + ' m²</td></tr>'
      : '') +
    '</table>' +
    (tt.tumpang
      ? '<p style="color:var(--merah);font-size:12.5px">Bidang Anda dan bidang ini bertindihan. ' +
        'Periksa patok bersama di lapangan sebelum menyelesaikan pengukuran.</p>'
      : ''));
}

function perbaruiPeringatanTumpang() {
  var p = $('peringatanTumpang');
  if (!S.konflik.length) { p.classList.add('tersembunyi'); return; }
  var total = S.konflik.reduce(function (a, k) { return a + k.luas_m2; }, 0);
  p.textContent = '⚠ Tumpang tindih dengan ' + S.konflik.length + ' bidang (±' +
                  total.toFixed(0) + ' m²) — ketuk untuk rincian';
  p.classList.remove('tersembunyi');
  p.onclick = panelTumpang;

/** Daftar konflik. Angka resmi diambil dari server agar konsisten bagi semua surveyor. */
