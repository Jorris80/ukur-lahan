/* ---------- TANDA TANGAN DIGITAL ---------- */
var PERAN_TTD = [
  { kunci: 'surveyor', judul: 'Surveyor', jabatan: 'Surveyor' },
  { kunci: 'pemilik', judul: 'Pemilik / Pemohon', jabatan: 'Pemilik / Pemohon' },
  { kunci: 'pejabat', judul: 'Pejabat', jabatan: 'Kepala Desa / Lurah' }
];

function panelTtd() {
  var ada = {};
  (S.aktif.ttd || []).forEach(function (t) { ada[t.peran] = t; });

  var isi = PERAN_TTD.map(function (p) {
    var t = ada[p.kunci];
    return '<div class="ttd-baris" data-peran="' + p.kunci + '">' +
      (t ? '<img src="' + esc(t.data_uri) + '" alt="tanda tangan">'
         : '<div class="kosong-ttd">belum</div>') +
      '<div class="isi"><b>' + esc(p.judul) + '</b><span>' +
      (t ? esc(t.nama) + ' &middot; ' + esc(String(t.ditandatangani_pada).substring(0, 10))
         : 'Ketuk untuk menandatangani') + '</span></div>' +
      (t && bisaTulis() ? '<button class="ikon-btn" data-hapus-ttd="' + esc(t.ttd_id) + '">&#10005;</button>' : '') +
      '</div>';
  }).join('');

  bukaLembar('Tanda Tangan Digital', isi +
    '<p class="jejak" style="text-align:left">Tanda tangan tercetak di berita acara PDF, lengkap dengan tanggalnya. ' +
    'Tanda tangan ulang akan menimpa yang lama.</p>');

  Array.prototype.forEach.call($('lembarIsi').querySelectorAll('.ttd-baris'), function (b) {
    b.onclick = function () {
      if (!bisaTulis()) { toast('Peran "viewer" tidak bisa menandatangani.', 'galat'); return; }
      padTtd(b.dataset.peran, ada[b.dataset.peran]);
    };
  });
  Array.prototype.forEach.call($('lembarIsi').querySelectorAll('[data-hapus-ttd]'), function (b) {
    b.onclick = function (ev) {
      ev.stopPropagation();
      if (!confirm('Hapus tanda tangan ini?')) return;
      api('hapusTtd', { ttd_id: b.dataset.hapusTtd })
        .then(function () {
          S.aktif.ttd = (S.aktif.ttd || []).filter(function (t) { return t.ttd_id !== b.dataset.hapusTtd; });
          panelTtd();
          toast('Tanda tangan dihapus.');
        })
        .catch(function (e) { toast(e.message, 'galat'); });
    };
  });
}

function padTtd(peran, adaTtd) {
  var def = PERAN_TTD.filter(function (p) { return p.kunci === peran; })[0];
  var namaAwal = (adaTtd && adaTtd.nama) ||
    (peran === 'surveyor' ? (S.aktif.lahan.surveyor || '') :
     peran === 'pemilik' ? (S.aktif.lahan.pemilik || '') : '');

  bukaLembar('Tanda Tangan — ' + def.judul,
    '<div class="grup"><label class="lbl">Nama penanda tangan</label>' +
      '<input id="nTtd" class="inp" value="' + esc(namaAwal) + '"></div>' +
    '<div class="grup"><label class="lbl">Jabatan</label>' +
      '<input id="jTtd" class="inp" value="' + esc((adaTtd && adaTtd.jabatan) || def.jabatan) + '"></div>' +
    '<label class="lbl">Goreskan tanda tangan di kotak</label>' +
    '<canvas id="padTtd" class="pad-ttd"></canvas>' +
    '<div class="pad-info"><span>Pakai jari atau stilus</span>' +
      '<button class="btn btn-kecil" id="bersihTtd">Bersihkan</button></div>' +
    '<div class="aksi-baris"><button class="btn" id="batalTtd">Batal</button>' +
      '<button class="btn btn-utama" id="simpanTtd">Simpan</button></div>');

  var kanvas = $('padTtd');
  var nisbah = window.devicePixelRatio || 1;
  var kotak = kanvas.getBoundingClientRect();
  kanvas.width = kotak.width * nisbah;
  kanvas.height = kotak.height * nisbah;
  var ctx = kanvas.getContext('2d');
  ctx.scale(nisbah, nisbah);
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#14181F';

  var menggores = false, adaGoresan = false;

  function posisi(e) {
    var r = kanvas.getBoundingClientRect();
    var titik = e.touches ? e.touches[0] : e;
    return { x: titik.clientX - r.left, y: titik.clientY - r.top };
  }
  function mulai(e) {
    e.preventDefault();
    menggores = true; adaGoresan = true;
    var p = posisi(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function gerak(e) {
    if (!menggores) return;
    e.preventDefault();
    var p = posisi(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  function henti() { menggores = false; }

  kanvas.addEventListener('pointerdown', mulai);
  kanvas.addEventListener('pointermove', gerak);
  kanvas.addEventListener('pointerup', henti);
  kanvas.addEventListener('pointerleave', henti);

  $('bersihTtd').onclick = function () {
    ctx.clearRect(0, 0, kanvas.width, kanvas.height);
    adaGoresan = false;
  };
  $('batalTtd').onclick = panelTtd;

  $('simpanTtd').onclick = function () {
    if (!adaGoresan) { toast('Goreskan tanda tangan dulu.', 'galat'); return; }
    var nama = $('nTtd').value.trim();
    if (!nama) { toast('Nama penanda tangan wajib diisi.', 'galat'); return; }

    // PNG transparan; diperkecil kalau melebihi batas satu sel Sheets
    var kecil = document.createElement('canvas');
    kecil.width = 460;
    kecil.height = Math.round(460 * (kanvas.height / kanvas.width));
    kecil.getContext('2d').drawImage(kanvas, 0, 0, kecil.width, kecil.height);
    var data = kecil.toDataURL('image/png');
    if (data.length > 44000) { toast('Goresan terlalu rumit. Sederhanakan lalu coba lagi.', 'galat'); return; }

    tunggu(true, 'Menyimpan tanda tangan...');
    api('simpanTtd', {
      lahan_id: S.aktif.lahan.lahan_id, peran: peran, nama: nama,
      jabatan: $('jTtd').value.trim(), data_uri: data
    })
      .then(function (d) {
        S.aktif.ttd = (S.aktif.ttd || []).filter(function (t) { return t.peran !== peran; });
        S.aktif.ttd.push({
          ttd_id: d.ttd_id, peran: peran, nama: nama, jabatan: $('jTtd').value.trim(),
          data_uri: data, ditandatangani_pada: new Date().toISOString()
        });
        panelTtd();
        toast('Tanda tangan tersimpan.', 'sukses');
      })
      .catch(function (e) { toast(e.message, 'galat'); })
      .then(function () { tunggu(false); });
  };
}

/* ---------- AKTIVITAS ---------- */
function muatLog() {
  $('daftarLog').innerHTML = '<div class="kosong">Memuat aktivitas...</div>';
  api('daftarLog', { limit: 80 })
    .then(function (d) {
      if (!d.length) { $('daftarLog').innerHTML = '<div class="kosong"><b>Belum ada aktivitas</b>Semua tindakan tercatat otomatis di sini.</div>'; return; }
      $('daftarLog').innerHTML = d.map(function (g) {
        return '<div class="log"><div class="log-tanda"></div><div>' +
          '<b>' + esc(g.aksi) + '</b> <time>' + esc(waktuSingkat(g.waktu)) + '</time>' +
          '<p>' + esc(g.detail) + '</p>' +
          '<time>' + esc(g.aktor) + '</time></div></div>';
      }).join('');
    })
    .catch(function (e) { $('daftarLog').innerHTML = '<div class="kosong">' + esc(e.message) + '</div>'; });
}

function waktuSingkat(iso) {
  var d = new Date(iso);
  if (isNaN(d)) return String(iso);
  return d.toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}

/* ---------- PENGATURAN ---------- */
function gambarPengaturan() {
  var p = S.pengguna;
  var html =
    '<div class="kartu" style="cursor:default">' +
      '<div class="profil" style="margin-bottom:0">' +
        '<div class="avatar" id="avatarSaya" style="background:' + warnaDari(p.username) + '">' +
        avatarHtml(p.username, p.nama_lengkap) + '</div>' +
        '<div style="flex:1"><b>' + esc(p.nama_lengkap) + '</b>' +
        '<span>' + esc(p.username) + ' &middot; ' + esc(p.role) + '</span>' +
        '<button class="btn btn-kecil" id="btnFotoProfil" style="margin-top:6px">Ubah foto profil</button> ' +
        (S.avatar[p.username] && S.avatar[p.username].foto
          ? '<button class="btn btn-kecil btn-bahaya" id="btnHapusFoto" style="margin-top:6px">Hapus</button>' : '') +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="menu-daftar" style="margin-top:14px;background:#fff;border:1px solid var(--garis);border-radius:14px;padding:0 12px">' +
    '<button class="menu-item" id="mSandi"><span class="em">&#128273;</span><span><b>Ganti password</b><small>Ubah kata sandi akun ini</small></span></button>' +
    (S.antrean.length
      ? '<button class="menu-item" id="mSinkron"><span class="em">&#8635;</span><span><b>Sinkronkan sekarang</b><small>' + S.antrean.length + ' perubahan menunggu</small></span></button>'
      : '') +
    (p.role === 'admin'
      ? '<button class="menu-item" id="mPengguna"><span class="em">&#128101;</span><span><b>Kelola pengguna</b><small>Tambah surveyor, atur peran</small></span></button>' +
        '<button class="menu-item" id="mKonfig"><span class="em">&#9881;</span><span><b>Pengaturan aplikasi</b><small>Nama instansi, toleransi GPS, WhatsApp</small></span></button>'
      : '') +
    '<button class="menu-item" id="mKeluar"><span class="em">&#8617;</span><span><b>Keluar</b><small>Akhiri sesi di perangkat ini</small></span></button>' +
    '</div>' +
    '<p class="jejak">GeoUkur GPS v' + esc(window.APP_VERSION) + ' - data tersimpan di Google Sheets</p>';

  $('isiPengaturan').innerHTML = html;

  // pastikan foto profil sendiri ada di cache, lalu segarkan tampilannya
  if (!S.avatar[p.username]) {
    api('profilSaya', {})
      .then(function (d) {
        S.avatar[d.username] = { foto: d.foto, nama: d.nama_lengkap, role: d.role };
        try { localStorage.setItem('gu_avatar', JSON.stringify(S.avatar)); } catch (e) {}
        if (halamanAktif === 'Pengaturan') gambarPengaturan();
      })
      .catch(function () {});
  }

  $('btnFotoProfil').onclick = function () { $('inputAvatar').click(); };
  if ($('btnHapusFoto')) $('btnHapusFoto').onclick = function () {
    if (!confirm('Hapus foto profil Anda?')) return;
    api('simpanFotoProfil', { data_uri: '' })
      .then(function () {
        S.avatar[p.username] = { foto: '', nama: p.nama_lengkap, role: p.role };
        localStorage.setItem('gu_avatar', JSON.stringify(S.avatar));
        gambarPengaturan();
        toast('Foto profil dihapus.');
      })
      .catch(function (e) { toast(e.message, 'galat'); });
  };

  $('mSandi').onclick = formGantiSandi;
  $('mKeluar').onclick = function () { keluar(false); };
  if ($('mSinkron')) $('mSinkron').onclick = sinkronkan;
  if ($('mPengguna')) $('mPengguna').onclick = panelPengguna;
  if ($('mKonfig')) $('mKonfig').onclick = panelKonfig;
}

function formGantiSandi() {
  bukaLembar('Ganti Password',
    '<div class="grup"><label class="lbl">Password lama</label><input id="pLama" class="inp" type="password"></div>' +
    '<div class="grup"><label class="lbl">Password baru (min. 6 karakter)</label><input id="pBaru" class="inp" type="password"></div>' +
    '<div class="aksi-baris"><button class="btn" id="pBatal">Batal</button>' +
    '<button class="btn btn-utama" id="pSimpan">Simpan</button></div>');

  $('pBatal').onclick = tutupLembar;
  $('pSimpan').onclick = function () {
    tunggu(true, 'Menyimpan...');
    api('gantiSandi', { lama: $('pLama').value, baru: $('pBaru').value })
      .then(function () { tutupLembar(); toast('Password diperbarui.', 'sukses'); })
      .catch(function (e) { toast(e.message, 'galat'); })
      .then(function () { tunggu(false); });
  };
}

function panelPengguna() {
  tunggu(true, 'Memuat pengguna...');
  api('daftarPengguna', {})
    .then(function (d) {
      var isi = d.map(function (u) {
        S.avatar[u.username] = S.avatar[u.username] || { foto: u.foto, nama: u.nama_lengkap, role: u.role };
        return '<div class="baris-titik">' +
          '<div class="kode" style="overflow:hidden;background:' + warnaDari(u.username) + '">' +
          (u.foto ? '<img src="' + esc(u.foto) + '" style="width:100%;height:100%;object-fit:cover">'
                  : esc(inisial(u.nama_lengkap))) + '</div>' +
          '<div class="koor"><b>' + esc(u.nama_lengkap) + '</b><span>' + esc(u.username) + ' - ' + esc(u.role) +
          (u.aktif ? '' : ' - nonaktif') + '</span></div>' +
          '<button class="ikon-btn" data-ubah="' + esc(u.user_id) + '">&#9998;</button>' +
          '<button class="ikon-btn" data-hapus="' + esc(u.user_id) + '">&#10005;</button></div>';
      }).join('');
      bukaLembar('Kelola Pengguna', isi + '<button class="btn btn-utama btn-lebar" id="uBaru">Tambah Pengguna</button>');

      $('uBaru').onclick = function () { formPengguna(null); };
      Array.prototype.forEach.call($('lembarIsi').querySelectorAll('[data-ubah]'), function (b) {
        b.onclick = function () {
          formPengguna(d.filter(function (x) { return x.user_id === b.dataset.ubah; })[0]);
        };
      });
      Array.prototype.forEach.call($('lembarIsi').querySelectorAll('[data-hapus]'), function (b) {
        b.onclick = function () {
          if (!confirm('Hapus pengguna ini?')) return;
          api('hapusPengguna', { user_id: b.dataset.hapus })
            .then(function () { toast('Pengguna dihapus.', 'sukses'); panelPengguna(); })
            .catch(function (e) { toast(e.message, 'galat'); });
        };
      });
    })
    .catch(function (e) { toast(e.message, 'galat'); })
    .then(function () { tunggu(false); });
}

function formPengguna(u) {
  u = u || {};
  var peran = ['admin', 'editor', 'viewer'].map(function (r) {
    return '<option' + (u.role === r ? ' selected' : '') + '>' + r + '</option>';
  }).join('');

  bukaLembar(u.user_id ? 'Ubah Pengguna' : 'Pengguna Baru',
    (u.user_id ? '' : '<div class="grup"><label class="lbl">Username</label><input id="uNama" class="inp" autocapitalize="none"></div>') +
    '<div class="grup"><label class="lbl">Nama lengkap</label><input id="uLengkap" class="inp" value="' + esc(u.nama_lengkap || '') + '"></div>' +
    '<div class="grup"><label class="lbl">Peran</label><select id="uPeran" class="inp">' + peran + '</select>' +
    '<small style="color:var(--tinta-3);font-size:11.5px">admin: semua akses - editor: ukur & edit - viewer: lihat & cetak</small></div>' +
    '<div class="grup"><label class="lbl">Password' + (u.user_id ? ' baru (kosongkan bila tidak diubah)' : '') + '</label>' +
    '<input id="uSandi" class="inp" type="password"></div>' +
    (u.user_id ? '<div class="grup"><label class="lbl">Status</label><select id="uAktif" class="inp">' +
      '<option value="true"' + (u.aktif ? ' selected' : '') + '>Aktif</option>' +
      '<option value="false"' + (!u.aktif ? ' selected' : '') + '>Nonaktif</option></select></div>' : '') +
    '<div class="aksi-baris"><button class="btn" id="uBatal">Batal</button>' +
    '<button class="btn btn-utama" id="uSimpan">Simpan</button></div>');

  $('uBatal').onclick = panelPengguna;
  $('uSimpan').onclick = function () {
    var p = {
      user_id: u.user_id,
      username: u.user_id ? undefined : ($('uNama').value || '').trim(),
      nama_lengkap: $('uLengkap').value.trim(),
      role: $('uPeran').value,
      password: $('uSandi').value || undefined,
      aktif: $('uAktif') ? $('uAktif').value === 'true' : true
    };
    tunggu(true, 'Menyimpan...');
    api('simpanPengguna', p)
      .then(function () { toast('Pengguna tersimpan.', 'sukses'); panelPengguna(); })
      .catch(function (e) { toast(e.message, 'galat'); })
      .then(function () { tunggu(false); });
  };
}

/**
 * Kumpulkan isi form pengaturan.
 * wa_admin SELALU dikirim (termasuk saat kosong) supaya nomor bisa dihapus;
 * fonnte_token hanya dikirim kalau diisi, supaya token lama tidak terhapus
 * gara-gara kolomnya memang sengaja dibiarkan kosong.
 */
function kumpulkanKonfig() {
  var p = {
    app_name: $('cNama').value.trim(),
    instansi: $('cInst').value.trim(),
    logo_url: $('cLogo').value.trim(),
    toleransi_akurasi: $('cTol').value,
    peta_zoom: $('cZoom').value,
    label_tiap: $('cLabel').value,
    peta_lat: $('cLat').value,
    peta_lng: $('cLng').value,
    wa_admin: $('cWa').value.trim()
  };
  if ($('cFonnte').value.trim()) p.fonnte_token = $('cFonnte').value.trim();
  return p;
}

function panelKonfig() {
  var c = S.config;
  bukaLembar('Pengaturan Aplikasi',
    '<div class="grup"><label class="lbl">Nama aplikasi</label><input id="cNama" class="inp" value="' + esc(c.app_name || '') + '"></div>' +
    '<div class="grup"><label class="lbl">Nama instansi (kop laporan)</label><input id="cInst" class="inp" value="' + esc(c.instansi || '') + '"></div>' +
    '<div class="grup"><label class="lbl">Logo kop laporan</label>' +
      '<div class="pratinjau-logo" id="cPratinjau"><span>Belum ada logo</span></div>' +
      '<div class="aksi-baris" style="margin-top:0">' +
      '<button class="btn" id="cUnggahLogo">Unggah berkas</button>' +
      '<button class="btn btn-bahaya" id="cHapusLogo">Hapus logo</button></div>' +
      '<small style="color:var(--tinta-3);font-size:11.5px">Berkas gambar disimpan langsung di dalam basis data, ' +
      'jadi selalu ikut tercetak di PDF. URL eksternal di bawah hanya cadangan dan sering gagal dimuat saat PDF dibuat.</small></div>' +
    '<div class="grup"><label class="lbl">URL logo (opsional)</label><input id="cLogo" class="inp" value="' + esc(c.logo_url || '') + '" placeholder="https://..."></div>' +
    '<div class="dua-kolom">' +
    '<div class="grup"><label class="lbl">Toleransi akurasi GPS (m)</label><input id="cTol" class="inp" type="number" value="' + (c.toleransi_akurasi || 10) + '"></div>' +
    '<div class="grup"><label class="lbl">Label tiap N titik otomatis</label><input id="cLabel" class="inp" type="number" min="1" value="' + (c.label_tiap || 5) + '"></div>' +
    '</div>' +
    '<div class="dua-kolom">' +
    '<div class="grup"><label class="lbl">Zoom peta awal</label><input id="cZoom" class="inp" type="number" value="' + (c.peta_zoom || 13) + '"></div>' +
    '</div>' +
    '<div class="dua-kolom">' +
    '<div class="grup"><label class="lbl">Lintang tengah peta</label><input id="cLat" class="inp" value="' + (c.peta_lat || '') + '"></div>' +
    '<div class="grup"><label class="lbl">Bujur tengah peta</label><input id="cLng" class="inp" value="' + (c.peta_lng || '') + '"></div>' +
    '</div>' +
    '<div class="grup"><label class="lbl">Token Fonnte (notifikasi WhatsApp, opsional)</label>' +
      '<input id="cFonnte" class="inp" placeholder="memuat..."></div>' +
    '<div class="grup"><label class="lbl">Nomor WA admin</label>' +
      '<input id="cWa" class="inp" type="tel" inputmode="numeric" placeholder="081234567890">' +
      '<small style="color:var(--tinta-3);font-size:11.5px">Boleh 08xx… atau 62xx…, otomatis dirapikan. ' +
      'Kosongkan untuk mematikan notifikasi.</small></div>' +
    '<button class="btn btn-lebar" id="cUjiWa" style="margin-top:0">Kirim pesan uji ke WhatsApp</button>' +
    '<div class="aksi-baris"><button class="btn" id="cBatal">Batal</button>' +
    '<button class="btn btn-utama" id="cSimpan">Simpan</button></div>');

  // Nomor WA & token tidak ikut konfigurasi publik (dianggap rahasia), jadi harus diambil
  // khusus di sini — kalau tidak, kolomnya selalu tampak kosong dan seolah gagal tersimpan.
  api('ambilRahasia', {})
    .then(function (r) {
      if ($('cWa')) $('cWa').value = r.wa_admin || '';
      if ($('cFonnte')) $('cFonnte').placeholder = r.ada_token
        ? 'Tersimpan (' + r.ekor_token + ') — isi untuk mengganti'
        : 'kosongkan bila tidak dipakai';
    })
    .catch(function () {
      if ($('cFonnte')) $('cFonnte').placeholder = 'kosongkan bila tidak dipakai';
    });

  $('cUjiWa').onclick = function () {
    tunggu(true, 'Mengirim pesan uji...');
    api('simpanKonfigurasi', kumpulkanKonfig())     // simpan dulu, baru uji
      .then(function () { return api('ujiWa', {}); })
      .then(function (d) { toast('Pesan uji terkirim ke ' + d.target + '.', 'sukses'); })
      .catch(function (e) { toast(e.message, 'galat'); })
      .then(function () { tunggu(false); });
  };

  // pratinjau logo yang tersimpan
  if (c.ada_logo) {
    api('ambilLogo', {}).then(function (d) {
      if (d.data && $('cPratinjau')) {
        $('cPratinjau').innerHTML = '<img src="' + esc(d.data) + '" alt="Logo"><span>Logo terpasang</span>';
      }
    }).catch(function () {});
  }

  $('cUnggahLogo').onclick = function () { $('inputLogo').click(); };
  $('cHapusLogo').onclick = function () {
    if (!confirm('Hapus logo dari kop laporan?')) return;
    api('hapusLogo', {})
      .then(function () {
        S.config.ada_logo = false;
        $('cLogo').value = '';
        $('cPratinjau').innerHTML = '<span>Belum ada logo</span>';
        toast('Logo dihapus.');
      })
      .catch(function (e) { toast(e.message, 'galat'); });
  };

  $('cBatal').onclick = tutupLembar;
  $('cSimpan').onclick = function () {
    tunggu(true, 'Menyimpan...');
    api('simpanKonfigurasi', kumpulkanKonfig())
      .then(function (cfg) {
        S.config = cfg;
        localStorage.setItem('gu_config', JSON.stringify(cfg));
        tutupLembar();
        toast('Pengaturan tersimpan.', 'sukses');
      })
      .catch(function (e) { toast(e.message, 'galat'); })
      .then(function () { tunggu(false); });
  };
}

/* ---------- MULAI ---------- */
function mulaiAplikasi() {
  var cfgTersimpan = JSON.parse(localStorage.getItem('gu_config') || 'null');
  if (cfgTersimpan) S.config = cfgTersimpan;

  document.documentElement.style.setProperty('--oranye', S.config.warna_utama || '#E8590C');
  $('layarLogin').classList.add('tersembunyi');
  $('aplikasi').classList.remove('tersembunyi');
  $('btnIkuti').classList.add('nyala');
  $('btnKunci').classList.toggle('nyala', S.kunciTitik);
  $('btnKunci').textContent = S.kunciTitik ? '🔒' : '🔓';
  $('btnKolab').classList.toggle('nyala', S.kolaborasi);
  simpanAntrean();
  statusJaringan();
  pindah('Beranda');
}

(function boot() {
  $('merekNama').textContent = S.config.app_name || 'GeoUkur GPS';
  $('merekInstansi').textContent = S.config.instansi || 'Sistem Pengukuran Lahan';
  if (S.token && S.pengguna) mulaiAplikasi();
})();

})();
